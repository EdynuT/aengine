<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEngine Hub</title>
    <style>
        /* --- 1. CORE ARCHITECTURE INTERNALS --- */
        :root {
            --bg-window: #258f25; /* Fallback protection */
            --bg-main: #424242;   /* Solid main canvas color from your spec */
            --bg-sidebar: #101012; /* Dark slate sidebar contrast */
            --bg-card: #222222;    /* Dark card inner body */
            --border-trace: #636363; /* Gray stroke accent */
            --text-primary: #f2f2f5;
            --text-secondary: #88888c;
            --text-active: #ffffff;
            --btn-hover: #1a1a1c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* --- 2. LAYOUT COMPONENTIZATION --- */
        /* Left Sidebar Panel Navigation */
        aside {
            width: 260px;
            background-color: var(--bg-sidebar);
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px 12px;
        }

        .brand {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding-left: 12px;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .separator {
            height: 1px;
            background-color: var(--border-trace);
            opacity: 0.3;
            margin-bottom: 24px;
            width: 100%;
        }

        .nav-button {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
        }

        .nav-button.active, .nav-button:hover {
            background-color: var(--btn-hover);
            color: var(--text-active);
        }

        /* Main Workspace Canvas Container */
        main {
            flex: 1;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-active);
        }

        /* Matrix Data Grid Architecture */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin-top: 16px;
        }

        /* --- 3. INTERACTIVE GEOMETRIC SLOTS --- */
        .project-slot {
            width: 200px;
            height: 160px;
            background-color: var(--bg-card);
            border: 1px dashed var(--border-trace);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s, border-color 0.2s, transform 0.15s;
        }

        .project-slot:hover {
            background-color: #28282a;
            border-color: var(--text-active);
            transform: translateY(-2px);
        }

        .project-slot:active {
            transform: translateY(0);
        }

        .glyph-plus {
            font-size: 46px;
            font-weight: 300;
            color: var(--border-trace);
            line-height: 1;
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .project-slot:hover .glyph-plus {
            color: var(--text-active);
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .project-slot:hover .label {
            color: var(--text-active);
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">Æ &nbsp;AEngine</div>
        <div class="separator"></div>
        <button class="nav-button active">Projects</button>
    </aside>

    <main>
        <h1>Recent Projects</h1>
        <div class="separator"></div>
        
        <div class="projects-grid">
            <div class="project-slot" onclick="executeEngineHandshake()">
                <div class="glyph-plus">+</div>
                <div class="label">New Project</div>
            </div>
        </div>
    </main>

    <script>
        // Bind Native JNI-Rust Bridge Target Pipeline
        const { invoke } = window.__TAURI__.core;

        function executeEngineHandshake() {
            console.log("[TAURI WEB] Invoking sub-process allocation handle: 'launch_core_engine'");
            
            // Dispatch payload target to background process compiler handler
            invoke('launch_core_engine', { projectPath: '/home/edynu/AeternumSandbox' })
                .catch((err) => console.error("[TAURI ERROR] IPC Handshake aborted:", err));
        }
    </script>
</body>
</html>
